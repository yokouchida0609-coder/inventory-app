<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生の重要6項目</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #5c6bc0, #7e57c2);
    color: white;
    padding: 20px 24px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }
  header .date { font-size: 0.85rem; opacity: .8; margin-top: 4px; }

  .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }

  .progress-wrap {
    background: white;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 10px;
  }
  .progress-label .pct { font-weight: 700; color: #5c6bc0; font-size: 1rem; }
  .progress-bar {
    height: 10px;
    background: #e0e0e0;
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #5c6bc0, #7e57c2);
    border-radius: 5px;
    transition: width 0.4s ease;
  }

  .goal-list { display: flex; flex-direction: column; gap: 10px; }

  .goal-card {
    background: white;
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s, opacity .3s;
    user-select: none;
    border-left: 4px solid transparent;
  }
  .goal-card:active { transform: scale(0.98); }
  .goal-card:hover { box-shadow: 0 3px 8px rgba(0,0,0,.15); }
  .goal-card.done { opacity: 0.5; }
  .goal-card.done .goal-name { text-decoration: line-through; color: #aaa; }

  .goal-icon { font-size: 1.6rem; flex-shrink: 0; width: 36px; text-align: center; }

  .goal-checkbox {
    width: 26px; height: 26px;
    border: 2px solid #ccc;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: white;
    transition: all .25s;
    margin-left: auto;
  }
  .goal-card.done .goal-checkbox {
    background: #5c6bc0;
    border-color: #5c6bc0;
  }
  .goal-card.done .goal-checkbox::after { content: '✓'; }

  .goal-name { font-size: 1.1rem; font-weight: 600; flex: 1; }
  .goal-sub  { font-size: 0.78rem; color: #aaa; margin-top: 2px; }

  /* カラー別アクセント */
  .goal-card[data-id="english"]   { border-left-color: #42a5f5; }
  .goal-card[data-id="stocks"]    { border-left-color: #66bb6a; }
  .goal-card[data-id="ribedai"]   { border-left-color: #ffa726; }
  .goal-card[data-id="ai"]        { border-left-color: #ab47bc; }
  .goal-card[data-id="divorce"]   { border-left-color: #ef5350; }
  .goal-card[data-id="bookkeep"]  { border-left-color: #26c6da; }

  .goal-card[data-id="english"].done   { border-left-color: #ccc; }
  .goal-card[data-id="stocks"].done    { border-left-color: #ccc; }
  .goal-card[data-id="ribedai"].done   { border-left-color: #ccc; }
  .goal-card[data-id="ai"].done        { border-left-color: #ccc; }
  .goal-card[data-id="divorce"].done   { border-left-color: #ccc; }
  .goal-card[data-id="bookkeep"].done  { border-left-color: #ccc; }

  .streak-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .streak-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e0e0e0;
  }
  .streak-dot.hit { background: #5c6bc0; }

  .reset-btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    color: #bbb;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .reset-btn:hover { background: #fce4ec; color: #e53935; border-color: #ffcdd2; }

  .complete-msg {
    text-align: center;
    padding: 14px;
    background: linear-gradient(135deg, #e8eaf6, #ede7f6);
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 1rem;
    color: #5c6bc0;
    font-weight: 600;
    display: none;
  }
  .complete-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>人生の重要6項目</h1>
  <div class="date" id="header-date"></div>
</header>

<div class="container">

  <div class="complete-msg" id="complete-msg">🎉 今日の6項目、全部完了！すごい！</div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>今日の達成</span>
      <span class="pct" id="pct-text">0 / 6</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="goal-list">
    <div class="goal-card" data-id="english" onclick="toggle('english')">
      <div class="goal-icon">🇬🇧</div>
      <div style="flex:1">
        <div class="goal-name">英語</div>
        <div class="goal-sub">リスニング・スピーキング・リーディングなど</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>

    <div class="goal-card" data-id="stocks" onclick="toggle('stocks')">
      <div class="goal-icon">📈</div>
      <div style="flex:1">
        <div class="goal-name">株</div>
        <div class="goal-sub">チェック・勉強・分析など</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>

    <div class="goal-card" data-id="ribedai" onclick="toggle('ribedai')">
      <div class="goal-icon">🏫</div>
      <div style="flex:1">
        <div class="goal-name">りべ大</div>
        <div class="goal-sub">動画視聴・宿題・実践など</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>

    <div class="goal-card" data-id="ai" onclick="toggle('ai')">
      <div class="goal-icon">🤖</div>
      <div style="flex:1">
        <div class="goal-name">AI</div>
        <div class="goal-sub">学習・ツール活用・制作など</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>

    <div class="goal-card" data-id="divorce" onclick="toggle('divorce')">
      <div class="goal-icon">💬</div>
      <div style="flex:1">
        <div class="goal-name">離婚カウンセリング</div>
        <div class="goal-sub">記録・振り返り・カウンセリングなど</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>

    <div class="goal-card" data-id="bookkeep" onclick="toggle('bookkeep')">
      <div class="goal-icon">📒</div>
      <div style="flex:1">
        <div class="goal-name">簿記</div>
        <div class="goal-sub">勉強・問題演習・復習など</div>
      </div>
      <div class="goal-checkbox"></div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetAll()">今日のチェックをリセット</button>
</div>

<script>
const STORAGE_KEY = 'life_goals_v1';
const GOALS = ['english','stocks','ribedai','ai','divorce','bookkeep'];
const DAY_NAMES = ['日','月','火','水','木','金','土'];

function toLocalDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

const now = new Date();
const todayStr = toLocalDateStr(now);

document.getElementById('header-date').textContent =
  now.getFullYear() + '/' +
  String(now.getMonth()+1).padStart(2,'0') + '/' +
  String(now.getDate()).padStart(2,'0') +
  '（' + DAY_NAMES[now.getDay()] + '）';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const s = raw ? JSON.parse(raw) : null;
    if (s && s.date === todayStr) return s;
  } catch(e) {}
  return { date: todayStr, checked: [] };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

function toggle(id) {
  const s = loadState();
  const idx = s.checked.indexOf(id);
  if (idx === -1) s.checked.push(id);
  else s.checked.splice(idx, 1);
  saveState(s);
  render();
}

function resetAll() {
  if (!confirm('今日のチェックをリセットしますか？')) return;
  saveState({ date: todayStr, checked: [] });
  render();
}

function render() {
  const s = loadState();
  const done = s.checked.length;
  const pct = Math.round(done / GOALS.length * 100);

  document.getElementById('pct-text').textContent = done + ' / ' + GOALS.length;
  document.getElementById('progress-fill').style.width = pct + '%';

  GOALS.forEach(id => {
    const card = document.querySelector('[data-id="' + id + '"]');
    if (!card) return;
    if (s.checked.includes(id)) card.classList.add('done');
    else card.classList.remove('done');
  });

  const msg = document.getElementById('complete-msg');
  if (done === GOALS.length) msg.classList.add('show');
  else msg.classList.remove('show');
}

render();
</script>
</body>
</html>
