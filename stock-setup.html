<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株価アラート設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      padding: 24px;
      color: #2d3748;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 6px;
      color: #1a202c;
    }
    .subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 28px;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .badge {
      background: #ebf8ff;
      color: #2b6cb0;
      border-radius: 99px;
      font-size: 12px;
      padding: 2px 10px;
      font-weight: 600;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 2px solid transparent;
    }
    .option:hover { background: #f7fafc; }
    .option.selected {
      background: #ebf8ff;
      border-color: #90cdf4;
    }
    .option input[type="checkbox"], .option input[type="radio"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #3182ce;
      flex-shrink: 0;
      cursor: pointer;
    }
    .option-label {
      font-size: 14px;
      line-height: 1.5;
    }
    .option-label strong {
      display: block;
      font-size: 15px;
    }
    .option-label span {
      color: #718096;
      font-size: 13px;
    }

    /* slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #3182ce;
    }
    .slider-value {
      min-width: 52px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      color: #2b6cb0;
    }
    .slider-label {
      font-size: 13px;
      color: #718096;
      padding: 0 12px;
    }

    /* submit */
    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #2c5282; }

    /* result */
    #result {
      display: none;
      background: #f0fff4;
      border: 2px solid #68d391;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 20px;
    }
    #result h2 { font-size: 16px; color: #276749; margin-bottom: 12px; }
    #result pre {
      font-family: 'Consolas', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      background: white;
      padding: 14px;
      border-radius: 8px;
      color: #2d3748;
      line-height: 1.7;
    }
    .note {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>📊 株価アラート 設定ウィザード</h1>
<p class="subtitle">チェックを入れて「設定を確定する」を押してください</p>

<!-- Q1: 通知方法 -->
<div class="section">
  <div class="section-title">
    Q1 <div class="badge">通知方法</div>
    どうやって知らせてほしいですか？（複数選択可）
  </div>

  <label class="option" id="opt-toast">
    <input type="checkbox" name="notify" value="toast">
    <div class="option-label">
      <strong>🖥️ Windowsトースト通知</strong>
      <span>画面右下にポップアップ表示。PCを開いていれば即気づける</span>
    </div>
  </label>

  <label class="option" id="opt-email">
    <input type="checkbox" name="notify" value="email">
    <div class="option-label">
      <strong>📧 メール通知</strong>
      <span>Gmailなどに送信。外出中でもスマホで受け取れる</span>
    </div>
  </label>

  <label class="option" id="opt-line">
    <input type="checkbox" name="notify" value="line">
    <div class="option-label">
      <strong>💬 LINE通知</strong>
      <span>LINEにメッセージ送信。スマホへのリアルタイム通知に最適</span>
    </div>
  </label>

  <label class="option" id="opt-log">
    <input type="checkbox" name="notify" value="log">
    <div class="option-label">
      <strong>📄 ログファイルに記録</strong>
      <span>CSVやテキストに保存。後でまとめて確認したい場合に</span>
    </div>
  </label>
</div>

<!-- Q2: 下落の基準 -->
<div class="section">
  <div class="section-title">
    Q2 <div class="badge">アラート基準</div>
    「価格が下がった」の判定方法は？
  </div>

  <label class="option" id="opt-base-buy">
    <input type="radio" name="base" value="buy">
    <div class="option-label">
      <strong>📌 スタート時の価格を基準にする</strong>
      <span>設定した日の終値を基準にして、そこから下落したらアラート</span>
    </div>
  </label>

  <label class="option" id="opt-base-prev">
    <input type="radio" name="base" value="prev">
    <div class="option-label">
      <strong>📅 前日終値と比べる</strong>
      <span>毎日リセット。その日の下落をその日に知らせる</span>
    </div>
  </label>

  <label class="option" id="opt-base-manual">
    <input type="radio" name="base" value="manual">
    <div class="option-label">
      <strong>✏️ 自分で購入価格を入力する</strong>
      <span>実際に買った値段を入れて、そこから何%下がったら通知</span>
    </div>
  </label>
</div>

<!-- Q3: 下落幅 -->
<div class="section">
  <div class="section-title">
    Q3 <div class="badge">アラート閾値</div>
    何%下落したら知らせてほしいですか？
  </div>
  <div class="slider-row">
    <span class="slider-label">1%</span>
    <input type="range" id="threshold" min="1" max="10" value="5" step="1"
           oninput="document.getElementById('tval').textContent = this.value + '%'">
    <span class="slider-label">20%</span>
    <div class="slider-value" id="tval">5%</div>
  </div>
</div>

<!-- Q4: チェック時刻 -->
<div class="section">
  <div class="section-title">
    Q4 <div class="badge">チェック時刻</div>
    価格をチェックする時刻を選んでください（複数選択可）
  </div>

  <label class="option" id="opt-freq-910">
    <input type="checkbox" name="freq" value="09:10">
    <div class="option-label">
      <strong>🌅 9:10（寄り付き直後）</strong>
      <span>市場オープン後10分、朝の動きをチェック</span>
    </div>
  </label>

  <label class="option" id="opt-freq-1200">
    <input type="checkbox" name="freq" value="12:00">
    <div class="option-label">
      <strong>🕛 12:00（昼休み）</strong>
      <span>前場の終値を確認。午前の動きをチェック</span>
    </div>
  </label>

  <label class="option" id="opt-freq-1600">
    <input type="checkbox" name="freq" value="16:00">
    <div class="option-label">
      <strong>🌇 16:00（引け後）</strong>
      <span>市場クローズ後、その日の終値でチェック</span>
    </div>
  </label>
</div>

<button class="submit-btn" onclick="showResult()">✅ 設定を確定する</button>

<div id="result">
  <h2>📋 選択内容（Claude に渡す設定）</h2>
  <pre id="result-text"></pre>
  <p class="note">この内容をもとにスクリプトを作成します</p>
</div>

<script>
  // ラジオ・チェックボックスの選択でハイライト
  document.querySelectorAll('.option input').forEach(input => {
    input.addEventListener('change', () => {
      if (input.type === 'radio') {
        document.querySelectorAll(`input[name="${input.name}"]`).forEach(r => {
          r.closest('.option').classList.remove('selected');
        });
      }
      input.closest('.option').classList.toggle('selected', input.checked);
    });
  });

  function showResult() {
    const notifyMap = { toast: 'Windowsトースト通知', email: 'メール通知', line: 'LINE通知', log: 'ログファイル記録' };
    const baseMap = { buy: 'スタート時の価格を基準', prev: '前日終値と比較', manual: '購入価格を手入力' };
    const freqMap = { '09:10': '9:10（寄り付き直後）', '12:00': '12:00（昼休み）', '16:00': '16:00（引け後）' };

    const notifies = [...document.querySelectorAll('input[name="notify"]:checked')].map(i => notifyMap[i.value]);
    const base = document.querySelector('input[name="base"]:checked');
    const freqs = [...document.querySelectorAll('input[name="freq"]:checked')].map(i => freqMap[i.value]);
    const threshold = document.getElementById('threshold').value;

    const errors = [];
    if (notifies.length === 0) errors.push('通知方法を1つ以上選んでください');
    if (!base) errors.push('アラート基準を選んでください');
    if (freqs.length === 0) errors.push('チェック時刻を1つ以上選んでください');

    if (errors.length > 0) {
      alert('⚠️ ' + errors.join('\n'));
      return;
    }

    const text = `【株価アラート設定】
通知方法    : ${notifies.join(' / ')}
アラート基準 : ${baseMap[base.value]}
下落閾値    : ${threshold}% 下落したら通知
チェック時刻 : ${freqs.join(' / ')}`;

    document.getElementById('result-text').textContent = text;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
